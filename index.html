<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>금융 도구 모음</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f2f4f6;
  color: #191f28;
  min-height: 100vh;
}
.container {
  max-width: 520px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}
.header {
  text-align: center;
  padding: 40px 0 32px;
}
.header h1 {
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 8px;
}
.header p {
  font-size: 14px;
  color: #8b95a1;
}
.tool-card {
  display: flex;
  align-items: center;
  gap: 16px;
  background: #ffffff;
  border-radius: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  padding: 20px 24px;
  margin-bottom: 12px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.tool-card:active {
  transform: scale(0.98);
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.tool-icon {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.tool-icon.blue { background: #e8f3ff; }
.tool-icon.green { background: #e8faf3; }
.tool-icon.purple { background: #f3e8ff; }
.tool-icon.orange { background: #fff4e8; }
.tool-info {
  flex: 1;
  min-width: 0;
}
.tool-name {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
}
.tool-desc {
  font-size: 13px;
  color: #8b95a1;
  line-height: 1.4;
}
.tool-arrow {
  color: #c4c9d0;
  font-size: 18px;
  flex-shrink: 0;
}
.footer {
  text-align: center;
  padding: 24px 0;
  font-size: 12px;
  color: #c4c9d0;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>금융 도구 모음</h1>
    <p>필요한 금융 계산기를 선택하세요</p>
  </div>

  <a class="tool-card" href="settlement-calculator.html">
    <div class="tool-icon blue">💱</div>
    <div class="tool-info">
      <div class="tool-name">정산 계산기</div>
      <div class="tool-desc">USDT 정산, 수수료 계산, 일별·월별 정산표</div>
    </div>
    <span class="tool-arrow">›</span>
  </a>

  <a class="tool-card" href="loan-calculator.html">
    <div class="tool-icon green">🏦</div>
    <div class="tool-info">
      <div class="tool-name">대출 계산기</div>
      <div class="tool-desc">원리금균등, 원금균등, 만기일시 상환 계산</div>
    </div>
    <span class="tool-arrow">›</span>
  </a>

</div>

<div class="footer">금융 도구 모음 v1.0</div>

</body>
</html>
